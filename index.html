<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог стран</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Экран приветствия -->
    <div id="welcome-screen" class="welcome-screen">
        <div class="welcome-card">
            <h1>🌍 Добро пожаловать в каталог стран</h1>
            <p>Исследуйте информацию о всех странах мира</p>
            
            <form id="welcome-form">
                <div class="input-group">
                    <label for="user-name">Как вас зовут?</label>
                    <input type="text" id="user-name" placeholder="Введите ваше имя" required>
                </div>
                <button type="submit" class="btn-primary">Далее →</button>
            </form>
        </div>
    </div>

    <!-- Основное приложение -->
    <div id="main-app" style="display: none;">
        
        <!-- Шапка -->
        <header class="header">
            <div class="container">
                <div class="header-content">
                    <h1>🌍 Каталог стран</h1>
                    <div style="display: flex; align-items: center; gap: 20px;">
                        <div id="greeting" class="greeting"></div>
                        <button id="logout-btn" class="logout-btn" title="Выйти из аккаунта">🚪 Выйти</button>
                    </div>
                </div>
            </div>
        </header>
        
        <!-- Панель управления -->
        <div class="controls-panel">
            <div class="container">
                <div class="controls-grid">
                    
                    <!-- Сортировка -->
                    <div class="control-group">
                        <label for="sort-select">📊 Сортировать по:</label>
                        <select id="sort-select">
                            <option value="name_asc">Названию (А-Я)</option>
                            <option value="name_desc">Названию (Я-А)</option>
                            <option value="population_asc">Населению (по возрастанию)</option>
                            <option value="population_desc">Населению (по убыванию)</option>
                            <option value="area_asc">Площади (по возрастанию)</option>
                            <option value="area_desc">Площади (по убыванию)</option>
                        </select>
                    </div>

                    <!-- Фильтр по региону -->
                    <div class="control-group">
                        <label for="region-filter">🌎 Регион:</label>
                        <select id="region-filter">
                            <option value="all">Все регионы</option>
                        </select>
                    </div>

                    <!-- Поиск -->
                    <div class="control-group">
                        <label for="search-input">🔍 Поиск по названию:</label>
                        <input type="text" id="search-input" placeholder="Например: Russia, Germany...">
                    </div>

                    <!-- Фильтр независимости -->
                    <div class="control-group checkbox-group">
                        <label>
                            <input type="checkbox" id="independent-filter">
                            🏳️ Только независимые страны
                        </label>
                    </div>

                    <!-- Сброс фильтров -->
                    <div class="control-group">
                        <button id="reset-filters" class="btn-secondary">🔄 Сбросить фильтры</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Статистика -->
        <div class="stats-panel">
            <div class="container">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="total-count">0</div>
                        <div class="stat-label">Всего стран</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="avg-population">0</div>
                        <div class="stat-label">Среднее население</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="avg-area">0</div>
                        <div class="stat-label">Средняя площадь (км²)</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="filtered-count">0</div>
                        <div class="stat-label">Отображается стран</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Карточки стран -->
        <main class="main-content">
            <div class="container">
            </div>
        </main>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
